name: Nova Ragie RAG Pipeline CI

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'pytest.ini'
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'pytest.ini'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  ragie-test-and-fix:
    name: Test Ragie RAG Pipeline with Nova
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run-tests
        continue-on-error: true
        run: |
          pytest -v --json-report --json-report-file=test-results.json || TEST_EXIT_CODE=$?
          echo "test_exit_code=${TEST_EXIT_CODE:-0}" >> $GITHUB_OUTPUT

      - name: Add "nova-in-progress" label
        if: steps.run-tests.outputs.test_exit_code != '0' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['nova-in-progress', 'nova-ragie', 'rag-pipeline']
            });

      - name: Install Nova CI-Rescue
        if: steps.run-tests.outputs.test_exit_code != '0'
        run: |
          pip install --upgrade nova-ci-rescue \
            --index-url https://dl.cloudsmith.io/T99gON7ReiBu6hPP/nova/nova-ci-rescue/python/simple/ \
            --extra-index-url https://pypi.org/simple/

      - name: Configure Git
        if: steps.run-tests.outputs.test_exit_code != '0'
        run: |
          git config user.name "nova-bot"
          git config user.email "nova-bot@github.com"

      - name: Add initial PR comment
        if: steps.run-tests.outputs.test_exit_code != '0' && github.event_name == 'pull_request'
        id: initial-comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `🤖 **Nova is fixing Ragie RAG pipeline bugs...**\n\n` +
              `🔍 **Pipeline**: Ragie RAG retrieval system\n` +
              `🧠 **ML Issues**: Cosine similarity, ranking, chunking, F1 scores\n` +
              `⚙️ **Safety**: Optimized for ML/RAG workloads\n` +
              `🔄 **Branch**: \`${{ github.event.pull_request.head.ref }}\`\n\n` +
              `_Nova specializes in fixing ML and RAG pipeline bugs! 🚀_`;

            const { data } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

            core.setOutput('comment_id', data.id);

      - name: Run Nova Fix
        if: steps.run-tests.outputs.test_exit_code != '0'
        id: nova-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGIE_API_KEY: ${{ secrets.RAGIE_API_KEY }}
        run: |
          START_TIME=$(date +%s)
          
          # Run Nova with CI-optimized settings
          export NOVA_DEMO_MODE_MAX_LINES=2000
          export NOVA_DEMO_MODE_MAX_TOKENS=4000
          
          nova fix --ci-mode --max-iters 3 --timeout 600 || NOVA_EXIT=$?
          
          echo "nova_exit_code=${NOVA_EXIT:-0}" >> $GITHUB_OUTPUT
          
          # Calculate metrics
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          
          # Check for changes
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "🤖 AI Fix: Resolve Ragie RAG pipeline bugs

- Fixed cosine similarity normalization
- Corrected ranking order and top-k selection
- Fixed chunking overlap calculation
- Added proper variance computation
- Corrected F1 score formula

All tests now pass."
            
            git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
            echo "changes_made=true" >> $GITHUB_OUTPUT
          else
            echo "changes_made=false" >> $GITHUB_OUTPUT
          fi

      - name: Update PR with results
        if: github.event_name == 'pull_request' && steps.run-tests.outputs.test_exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const changesMade = '${{ steps.nova-fix.outputs.changes_made }}' === 'true';
            const duration = '${{ steps.nova-fix.outputs.duration }}' || '0s';
            
            let finalComment = '';
            if (changesMade) {
              finalComment = `✅ **Nova fixed all Ragie RAG pipeline bugs!**\n\n` +
                `**Time:** ${duration}\n` +
                `**ML Fixes:** Cosine similarity, ranking, F1 scores, and more\n` +
                `**Safety:** ✅ Within ML-optimized limits\n\n` +
                `👉 **Ready to merge** — All RAG tests now pass`;
                
              // Update label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['nova-ragie-fixed', 'ml-fixed']
              });
            } else {
              finalComment = `⚠️ **Nova needs help**\n\n` +
                `No changes were made. Manual review needed.`;
                
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['nova-ragie-needs-review', 'ml-review']
              });
            }

            if ('${{ steps.initial-comment.outputs.comment_id }}') {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt('${{ steps.initial-comment.outputs.comment_id }}'),
                body: finalComment
              });
            }

      - name: Verify tests pass
        if: steps.nova-fix.outputs.changes_made == 'true'
        run: |
          pytest -v
          echo "✅ All tests now pass after Nova fixes!"


